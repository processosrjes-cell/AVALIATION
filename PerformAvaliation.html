<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Performance Evaluation</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--dark:#0F6E56;--lgreen:#E1F5EE;--bdgreen:#5DCAA5;
  --amber:#EF9F27;--damber:#854F0B;--lamber:#FAEEDA;--bdamber:#EF9F27;
  --red:#E24B4A;--dred:#A32D2D;--lred:#FCEBEB;--bdred:#F09595;
  --blue:#185FA5;--lblue:#E6F1FB;
  --purple:#533AB7;--lpurple:#EEEDFE;
  --olive:#3B6D11;--lolive:#EAF3DE;
  --bg:#F6F5F1;--card:#fff;--border:#E2E0DA;--border2:#CCCAC3;
  --text:#1A1A18;--text2:#6B6963;--text3:#A09D97;
  --sidebar:210px;--header:52px;
  font-family:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
table{border-collapse:collapse;width:100%}

/* ── Layout ───────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
#main-layout{display:none;flex-direction:column;min-height:100vh}
#main-layout.visible{display:flex}
header{height:var(--header);background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 1.25rem;position:sticky;top:0;z-index:100}
.body-wrap{display:flex;flex:1;overflow:hidden}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto}
#content{flex:1;overflow-y:auto;padding:1.5rem}

/* ── Sidebar nav ──────────────────────────────────────────────────────────── */
.nav-section{padding:.75rem .75rem .25rem;font-size:10px;font-weight:600;
  color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 1.25rem;cursor:pointer;
  font-size:13px;color:var(--text2);border-right:2px solid transparent;transition:all .12s}
.nav-item:hover{background:#F6F5F1;color:var(--text)}
.nav-item.active{background:#F0EFEA;color:var(--text);font-weight:500;border-right-color:var(--active-color,var(--green))}
.nav-item .icon{font-size:14px;opacity:.5}
.nav-item.active .icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;
  padding:1px 6px;font-size:10px;font-weight:600}
.sidebar-foot{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid var(--border)}

/* ── Cards ────────────────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:1.25rem;margin-bottom:1rem}
.card-title{font-weight:600;font-size:14px;margin-bottom:.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}

/* ── Metrics ──────────────────────────────────────────────────────────────── */
.met{background:#F6F5F1;border-radius:8px;padding:1rem}
.met-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.met-val{font-size:22px;font-weight:500}
.met-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Chips ────────────────────────────────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;
  font-size:11px;font-weight:500;border:.5px solid;white-space:nowrap}
.chip-bom  {color:var(--dark);background:var(--lgreen);border-color:var(--bdgreen)}
.chip-medio{color:var(--damber);background:var(--lamber);border-color:var(--bdamber)}
.chip-ruim {color:var(--dred);background:var(--lred);border-color:var(--bdred)}
.chip-gray {color:var(--text2);background:#F0EFEA;border-color:var(--border2)}
.chip-crit {color:var(--dred);background:var(--lred);border-color:var(--bdred)}
.chip-grav {color:var(--damber);background:var(--lamber);border-color:var(--bdamber)}
.chip-medi {color:var(--blue);background:var(--lblue);border-color:#85B7EB}
.chip-leve {color:var(--olive);background:var(--lolive);border-color:#A3C97A}

/* ── Buttons ──────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:13px;
  border-radius:8px;border:.5px solid var(--border2);background:transparent;
  color:var(--text);transition:all .12s}
.btn:hover{background:#F0EFEA}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn-full{width:100%;justify-content:center}
.btn-pr{background:var(--green);color:#fff;border-color:transparent}
.btn-pr:hover{background:var(--dark)}
.btn-dn{color:var(--dred);border-color:var(--bdred)}
.btn-am{background:var(--lamber);color:var(--damber);border-color:var(--bdamber)}
.btn-gh{border-color:transparent;color:var(--text2)}

/* ── Forms ────────────────────────────────────────────────────────────────── */
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{
  width:100%;border:.5px solid var(--border2);border-radius:8px;padding:8px 10px;
  font-size:13px;background:var(--card);color:var(--text);outline:none;
  font-family:inherit;transition:border-color .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green)}
.fg textarea{min-height:72px;resize:vertical}

/* ── Table ────────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
.tbl th{font-size:11px;font-weight:500;color:var(--text2);text-align:left;
  padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;font-size:13px;border-bottom:.5px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFAF8}

/* ── Score bar ────────────────────────────────────────────────────────────── */
.sbar{height:6px;border-radius:3px;background:#EEECEA;overflow:hidden;margin-top:4px}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s}

/* ── Alerts ───────────────────────────────────────────────────────────────── */
.alrt{padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:13px;border:.5px solid}
.alrt-wn{background:var(--lamber);color:var(--damber);border-color:var(--bdamber)}
.alrt-dn{background:var(--lred);color:var(--dred);border-color:var(--bdred)}
.alrt-ok{background:var(--lgreen);color:var(--dark);border-color:var(--bdgreen)}
.alrt-if{background:var(--lblue);color:var(--blue);border-color:#85B7EB}

/* ── Modals ───────────────────────────────────────────────────────────────── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:12px;border:1px solid var(--border);
  padding:1.5rem;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:15px;font-weight:500}
.modal-close{background:none;border:none;font-size:22px;color:var(--text2);line-height:1;padding:0 4px}

/* ── Page header ──────────────────────────────────────────────────────────── */
.ph{margin-bottom:1.25rem}
.ph-title{font-size:16px;font-weight:500;margin-bottom:2px}
.ph-sub{font-size:13px;color:var(--text2)}

/* ── Divider ──────────────────────────────────────────────────────────────── */
.div{height:.5px;background:var(--border);margin:1rem 0}

/* ── Logo ─────────────────────────────────────────────────────────────────── */
.logo{width:28px;height:28px;background:var(--green);border-radius:6px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{display:block}

/* ── Score composition box ────────────────────────────────────────────────── */
.scorecomp{background:#F6F5F1;border-radius:8px;padding:10px 14px}
.scorecomp-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}

/* ── Confrat banner ───────────────────────────────────────────────────────── */
.confrat{background:var(--lgreen);border:.5px solid var(--bdgreen);border-radius:12px;
  padding:1rem 1.25rem;display:flex;gap:1rem;align-items:center;margin-bottom:.75rem}

/* ── Tab buttons ──────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{padding:5px 14px;border-radius:8px;border:.5px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;cursor:pointer;transition:all .12s}
.tab.active{background:var(--green);color:#fff;border-color:transparent}

/* ── Print styles ─────────────────────────────────────────────────────────── */
@media print{
  #main-layout,header,#sidebar,.no-print{display:none!important}
  #print-area{display:block!important}
  body{background:#fff}
  @page{margin:1.5cm;size:A4}
}
#print-area{display:none}
.print-doc{font-family:'Segoe UI',sans-serif;font-size:12px;color:#1A1A18;line-height:1.5}
.print-header{background:#1D9E75;color:#fff;padding:16px 20px;border-radius:8px;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.print-header h1{font-size:16px;font-weight:600;margin:0}
.print-header .meta{font-size:10px;text-align:right;line-height:1.8;opacity:.9}
.print-score-box{display:flex;gap:16px;margin-bottom:16px}
.print-score-big{flex:0 0 120px;background:#E1F5EE;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.print-score-num{font-size:40px;font-weight:700;color:#1D9E75;line-height:1}
.print-score-label{font-size:11px;color:#0F6E56;font-weight:600;margin-top:4px}
.print-info{flex:1;background:#F6F5F1;border-radius:8px;padding:12px 16px;font-size:11px;line-height:2}
.print-info b{color:#1A1A18}
.print-section-title{font-size:12px;font-weight:700;color:#0F6E56;margin:14px 0 6px;
  border-bottom:1.5px solid #1D9E75;padding-bottom:3px}
.print-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px}
.print-table th{background:#0F6E56;color:#fff;padding:6px 10px;text-align:left;font-weight:600}
.print-table td{padding:6px 10px;border-bottom:.5px solid #E2E0DA}
.print-table tr:nth-child(even) td{background:#F6F5F1}
.print-bar-wrap{height:8px;background:#E2E0DA;border-radius:4px;margin:4px 0;overflow:hidden}
.print-bar-fill{height:100%;border-radius:4px}
.print-sigs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:24px;padding-top:16px;border-top:.5px solid #ccc}
.print-sig{text-align:center;font-size:10px}
.print-sig-line{border-bottom:.5px solid #555;margin-bottom:6px;height:28px}
.print-sig b{display:block;font-size:11px;margin-bottom:2px}
.print-footer{margin-top:20px;text-align:center;font-size:9px;color:#A09D97;border-top:.5px solid #E2E0DA;padding-top:8px}
.print-alrt{background:#FCEBEB;border:.5px solid #F09595;border-radius:6px;
  padding:8px 12px;color:#A32D2D;font-size:11px;font-weight:600;margin-bottom:12px;text-align:center}
.print-plan{width:100%;border-collapse:collapse;font-size:11px}
.print-plan th{background:#EF9F27;color:#fff;padding:6px 10px;text-align:left;font-weight:600}
.print-plan td{padding:8px 10px;border-bottom:.5px solid #E2E0DA;height:28px}

</head>

function findUser(email, senha) {
  const g = DB.gestao.find(x => x.email.toLowerCase() === email && x.senha === senha);
  if (!g) return null;
  // cargo do gestao mapeia para perfil
  const cargoPerfilMap = {adm:"adm", rgm:"rgm", coordenador:"coordenador", supervisor:"supervisor", lider:"lider"};
  const perfil = cargoPerfilMap[g.cargo];
  if (!perfil) return null;
  return { perfil, gid: g.id };
}

// HELPERS

const score=(cid,mes=MES)=>{
  const v=DB.inconformidades.filter(i=>i.colaboradorId===cid&&i.mes===mes&&i.status==="Validada");
  const d=DB.destaques.filter(i=>i.colaboradorId===cid&&i.mes===mes&&i.status==="Validado");
  const desc=v.reduce((a,i)=>a+(DESCONTO[i.gravidade]||0),0);
  const bonus=d.reduce((a,i)=>a+(BONUS[i.nivel]||0),0);
  return Math.min(10,Math.max(0,10-desc+bonus));
};
const faixa=s=>s>=8?{l:"Bom",c:"#1D9E75",bg:"#E1F5EE",bd:"#5DCAA5",cls:"chip-bom"}
              :s>=5?{l:"Médio",c:"#854F0B",bg:"#FAEEDA",bd:"#EF9F27",cls:"chip-medio"}
                   :{l:"Ruim",c:"#A32D2D",bg:"#FCEBEB",bd:"#F09595",cls:"chip-ruim"};
const gt=(id)=>DB.gestao.find(g=>g.id===id)||{};
const mediaT=(turno)=>{
  const ids=DB.colaboradores.filter(c=>c.turno===turno&&c.status==="Ativo").map(c=>c.id);
  if(!ids.length)return 0;
  return ids.reduce((a,id)=>a+score(id),0)/ids.length;
};
const pendentes=()=>[
  ...DB.inconformidades.filter(i=>i.status==="Pendente"),
  ...DB.destaques.filter(i=>i.status==="Pendente"),
];
const fmtScore=s=>s.toFixed(1);
const gravChip=g=>`<span class="chip" style="color:${GC[g]};background:${GB[g]};border-color:${GC[g]}">${g}</span>`;
const statusChip=s=>{
  const m={Validada:"#1D9E75",Pendente:"#854F0B",Recusada:"#A32D2D",Cancelada:"#888"};
  return `<span style="font-size:12px;color:${m[s]||"#888"};font-weight:${s==="Recusada"?"600":"400"}">${s}</span>`;
};
const faixaChip=s=>{const f=faixa(s);return `<span class="chip ${f.cls}">${f.l}</span>`};
const barHtml=(s,w="100%")=>{
  const c=s>=8?"#1D9E75":s>=5?"#EF9F27":"#E24B4A";
  return `<div class="sbar" style="width:${w}"><div class="sbar-fill" style="width:${s*10}%;background:${c}"></div></div>`;
};
const scoreCompHtml=(cid)=>{
  const v=DB.inconformidades.filter(i=>i.colaboradorId===cid&&i.mes===MES&&i.status==="Validada");
  const d=DB.destaques.filter(i=>i.colaboradorId===cid&&i.mes===MES&&i.status==="Validado");
  const s=score(cid);
  const incRows=v.map(i=>`<div class="scorecomp-row">
    <span style="color:${GC[i.gravidade]}">— ${i.gravidade}: ${i.descricao.slice(0,38)}${i.descricao.length>38?"…":""}</span>
    <span style="color:#A32D2D;font-weight:600">-${DESCONTO[i.gravidade].toFixed(1)}</span>
  </div>`).join("");
  const destRows=d.map(i=>`<div class="scorecomp-row">
    <span style="color:${DC[i.nivel]}">+ ${i.nivel}: ${i.descricao.slice(0,38)}${i.descricao.length>38?"…":""}</span>
    <span style="color:#1D9E75;font-weight:600">+${BONUS[i.nivel].toFixed(1)}</span>
  </div>`).join("");
  return `<div class="scorecomp">
    <div class="scorecomp-row"><span style="color:#6B6963">Pontuação inicial</span><span style="font-weight:600">10,0</span></div>
    ${incRows}${destRows}
    <div class="div"></div>
    <div class="scorecomp-row" style="font-size:13px;font-weight:600">
      <span>Pontuação Final</span><span style="color:${faixa(s).c}">${fmtScore(s)}</span>
    </div>
  </div>`;
};

function buildLayout(){
  const p=PERFIS[SESSION.perfil];
  const g=gt(SESSION.gid);
  const pend=pendentes().length;

  // Header badge
  const badge=document.getElementById("hd-badge");
  badge.style.background=p.bgCor;badge.style.color=p.cor;
  badge.style.border=`.5px solid ${p.cor}40`;
  badge.innerHTML=`<span style="width:7px;height:7px;border-radius:50%;background:${p.cor};display:inline-block"></span>
    ${p.label}${g.turno&&g.turno!=="Todos"?" — "+g.turno:""}`;
  document.getElementById("hd-user").textContent=g.nome||"";
  document.getElementById("sb-mes").textContent=MES;

  const sbPend=document.getElementById("sb-pend");
  if(pend>0&&SESSION.perfil!=="lider"){
    sbPend.textContent=`⚠ ${pend} pendente(s)`;sbPend.style.display="block";
  }else{sbPend.style.display="none"}

  // Sidebar nav
  document.getElementById("nav-items").innerHTML=p.pages.map(pg=>{
    const m=PAGE_META[pg];
    const hasBadge=(pg.includes("inc")||pg.includes("validar"))&&pend>0;
    const isActive=pg===PAGE;
    return `<div class="nav-item${isActive?" active":""}" onclick="goTo('${pg}')" style="--active-color:${p.cor}">
      <span class="icon">${m?.icon||""}</span>
      <span style="flex:1">${m?.label||pg}</span>
      ${hasBadge?`<span class="nav-badge">${pend}</span>`:""}
    </div>`;
  }).join("");
}

function toggleGravAlt(){
  const d=document.getElementById("val-dec").value;
  const alt=document.getElementById("grav-alt");
  const info=document.getElementById("dec-info");
  if(alt)alt.style.display=d==="alterar"?"block":"none";
  if(info){
    const msgs={
      confirmar:{cls:"alrt-ok",txt:"✅ A inconformidade será validada e o desconto aplicado na pontuação."},
      alterar:{cls:"alrt-ok",txt:"✅ A inconformidade será validada com a nova gravidade selecionada e o desconto aplicado."},
      recusar:{cls:"alrt-wn",txt:"❌ A inconformidade será recusada. Nenhum desconto será aplicado na pontuação."},
      cancelar:{cls:"alrt-dn",txt:"🚫 O registro será cancelado e removido do histórico do colaborador."},
    };
    const m=msgs[d];
    if(m){info.className=`alrt ${m.cls}`;info.textContent=m.txt;info.style.display="block";}
    else{info.style.display="none";}
  }
}

function confirmarValidacao(incId){
  const dec=document.getElementById("val-dec").value;
  const obs=document.getElementById("val-obs").value;
  const ng=document.getElementById("val-grav")?.value;
  const inc=DB.inconformidades.find(i=>i.id===incId);
  if(!inc)return;
  if(dec==="cancelar"){
    // Remove o registro completamente
    DB.inconformidades=DB.inconformidades.filter(i=>i.id!==incId);
  } else {
    inc.status=dec==="recusar"?"Recusada":"Validada";
    if(dec==="alterar"&&ng)inc.gravidade=ng;
    inc.supId=SESSION.gid;inc.obsS=obs;
  }
  dbSave();closeModal();renderPage();buildLayout();
}

function pageRGMVisao(){

    <span style="font-size:24px">🎉</span>
    <div><div style="font-weight:600;color:#0F6E56">Turno ${x.t} — confraternização!</div>

  const histRows=turnos.map((t,ti)=>{
    const cs=["#EF9F27","#1D9E75","#888780"][ti];

    const atual=mediaT(t);
    return `<div style="margin-bottom:10px">

          <span><span style="color:#A09D97;font-size:11px">Mai/25 </span><strong style="color:${cs}">${fmtScore(atual)}</strong></span>

      </div>${barHtml(atual)}

function admExcluirColab(id){
  const c=DB.colaboradores.find(x=>x.id===id);
  if(!c)return;
  if(!confirm(`Excluir permanentemente "${c.nome}"?\nEsta ação não pode ser desfeita.`))return;
  // Remove colaborador e suas inconformidades associadas
  DB.colaboradores=DB.colaboradores.filter(x=>x.id!==id);
  DB.inconformidades=DB.inconformidades.filter(x=>x.colaboradorId!==id);
  dbSave();renderPage();
}

function admGestaoCargoChange(){
  const cargo=document.getElementById("gu-cargo")?.value;
  const turno=document.getElementById("gu-turno");
  const info=document.getElementById("gu-info");
  if(!turno||!info)return;
  if(cargo==="coordenador"||cargo==="rgm"||cargo==="adm"){
    turno.value="Todos";
    info.style.display="block";
    info.textContent=`Nível ${cargo==="adm"?"Administrador":cargo==="rgm"?"RGM":"Coordenador"} tem acesso a todos os turnos.`;
  }else{
    info.style.display="none";
  }
}

function admSalvarGestao(){
  const nome=document.getElementById("gu-nome")?.value.trim();
  const email=document.getElementById("gu-email")?.value.trim().toLowerCase();
  const senha=document.getElementById("gu-senha")?.value;
  const senha2=document.getElementById("gu-senha2")?.value;
  const cargo=document.getElementById("gu-cargo")?.value;
  const turno=document.getElementById("gu-turno")?.value;
  const info=document.getElementById("gu-info");

  if(!nome||!email||!senha||!cargo){
    info.style.display="block";info.className="alrt alrt-dn";
    info.textContent="Preencha todos os campos obrigatórios (*)";return;
  }
  if(senha.length<6){
    info.style.display="block";info.className="alrt alrt-dn";
    info.textContent="A senha deve ter pelo menos 6 caracteres.";return;
  }
  if(senha!==senha2){
    info.style.display="block";info.className="alrt alrt-dn";
    info.textContent="As senhas não conferem.";return;
  }
  if(DB.gestao.find(g=>g.email===email)){
    info.style.display="block";info.className="alrt alrt-dn";
    info.textContent="Este e-mail já está cadastrado.";return;
  }
  const novoId="G"+String(Date.now()).slice(-6);
  DB.gestao.push({id:novoId,nome,cargo,turno,email,senha});
  dbSave();window._admGestTab="lista";
  renderPage();
}

function admRemoverGestao(gid){
  if(!confirm("Remover este usuário? Esta ação não pode ser desfeita."))return;
  const idx=DB.gestao.findIndex(g=>g.id===gid);
  if(idx>=0)DB.gestao.splice(idx,1);
  dbSave();renderPage();

function admConfirmarEdicao(gid){
  const g=DB.gestao.find(x=>x.id===gid);
  if(!g)return;
  const nome=document.getElementById("eg-nome").value.trim();
  const email=document.getElementById("eg-email").value.trim().toLowerCase();
  const senha=document.getElementById("eg-senha").value;
  const senha2=document.getElementById("eg-senha2").value;
  const cargo=document.getElementById("eg-cargo").value;
  const turno=document.getElementById("eg-turno").value;
  const err=document.getElementById("eg-err");

  if(!nome||!email){err.style.display="block";err.textContent="Nome e e-mail são obrigatórios.";return}
  const duplicado=DB.gestao.find(x=>x.email===email&&x.id!==gid);
  if(duplicado){err.style.display="block";err.textContent="Este e-mail já está em uso por outro usuário.";return}
  if(senha){
    if(senha.length<6){err.style.display="block";err.textContent="A senha deve ter pelo menos 6 caracteres.";return}
    if(senha!==senha2){err.style.display="block";err.textContent="As senhas não conferem.";return}
    g.senha=senha;
  }
  g.nome=nome;g.email=email;g.cargo=cargo;g.turno=turno;
  dbSave();closeModal();renderPage();
}

function doImprimir(html){
  const area=document.getElementById("print-area");
  area.innerHTML=`<div class="print-doc">${html}</div>`;
  closeModal();
  setTimeout(()=>window.print(),100);
}

      Matrícula: ${matricula}<br/>Nível: ${nivel}<br/>Turno: ${turno}<br/>Período: ${mes}

function printFooter(){
  return `<div class="print-footer">Performance Evaluation · Gerado em ${now()} · Documento Confidencial</div>`;
}

function printSigs(a,b,c){

function imprimirRelatorioTurno(turno){
  const cols=DB.colaboradores.filter(c=>c.turno===turno&&c.status==="Ativo");
  const scores=cols.map(c=>({c,s:score(c.id)})).sort((a,b)=>b.s-a.s);
  const med=scores.length?scores.reduce((a,x)=>a+x.s,0)/scores.length:0;
  const sup=DB.gestao.find(g=>g.turno===turno&&g.cargo==="supervisor");
  const f=faixa(med);const barW=Math.round(med*10);
  const rows=scores.map(({c,s},i)=>{
    const fi=faixa(s);const qi=DB.inconformidades.filter(inc=>inc.colaboradorId===c.id&&inc.mes===MES&&inc.status==="Validada").length;
    return `<tr><td>${i+1}</td><td><strong>${c.nome}</strong></td><td>${c.nivel}</td>
      <td style="color:${fi.c};font-weight:700">${fmtScore(s)}</td>
      <td style="color:${fi.c}">${fi.l}</td><td>${qi||"—"}</td></tr>`;
  }).join("");
  const bom=scores.filter(x=>x.s>=8).length,medQ=scores.filter(x=>x.s>=5&&x.s<8).length,ruim=scores.filter(x=>x.s<5).length;
  doImprimir(`
    <div class="print-header">
      <div><div style="font-size:11px;opacity:.8;margin-bottom:4px">PERFORMANCE EVALUATION</div>
        <h1>Relatório — Turno ${turno}</h1></div>
      <div class="meta">${MES}<br/>Supervisor: ${sup?.nome||"—"}<br/>Data: ${now()}</div>
    </div>
    ${med>=8?`<div style="background:#E1F5EE;border:1px solid #5DCAA5;border-radius:6px;padding:8px 12px;text-align:center;color:#0F6E56;font-weight:600;margin-bottom:12px">🎉 Turno elegível para confraternização — Média ${fmtScore(med)}</div>`:""}
    <div style="display:grid;grid-template-columns:120px 1fr;gap:12px;margin-bottom:14px;align-items:center">
      <div style="background:${f.bg};border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:32px;font-weight:700;color:${f.c}">${fmtScore(med)}</div>
        <div style="font-size:11px;color:${f.c};font-weight:600">MÉDIA ${f.l.toUpperCase()}</div>
      </div>
      <div>
        <div class="print-bar-wrap"><div class="print-bar-fill" style="width:${barW}%;background:${f.c}"></div></div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px">
          <span style="color:#1D9E75">✓ Bom: ${bom}</span>
          <span style="color:#854F0B">◉ Médio: ${medQ}</span>
          <span style="color:#A32D2D">✗ Ruim: ${ruim}</span>
        </div>
      </div>
    </div>
    <div class="print-section-title">Resultado Individual</div>
    <table class="print-table">
      <thead><tr><th>#</th><th>Colaborador</th><th>Nível</th><th>Pontuação</th><th>Faixa</th><th>Inc.</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${printFooter()}
  `);
}

function imprimirLista(faixaTipo,turno){
  const cols=DB.colaboradores.filter(c=>c.turno===turno&&c.status==="Ativo");
  const scores=cols.map(c=>({c,s:score(c.id)}))
    .filter(x=>faixaTipo==="ruim"?x.s<5:faixaTipo==="medio"?x.s>=5&&x.s<8:x.s>=8)
    .sort((a,b)=>a.s-b.s);
  const cor=faixaTipo==="ruim"?"#A32D2D":faixaTipo==="medio"?"#854F0B":"#1D9E75";
  const titulo=faixaTipo==="ruim"?"Pontuação Insatisfatória (0–4)":faixaTipo==="medio"?"Pontuação Média (5–7)":"Pontuação Bom (8–10)";
  const sup=DB.gestao.find(g=>g.turno===turno&&g.cargo==="supervisor");
  const rows=scores.map(({c,s},i)=>{
    const qi=DB.inconformidades.filter(i=>i.colaboradorId===c.id&&i.mes===MES&&i.status==="Validada").length;
    return `<tr><td><strong>${c.nome}</strong></td><td>${c.id}</td><td>${c.nivel}</td>
      <td style="color:${cor};font-weight:700">${fmtScore(s)}</td><td>${qi}</td>
      <td>[ ] Sim  [ ] Não</td></tr>`;
  }).join("");
  doImprimir(`
    <div class="print-header">
      <div><div style="font-size:11px;opacity:.8;margin-bottom:4px">PERFORMANCE EVALUATION</div>
        <h1>Lista para Gestor — ${titulo}</h1></div>
      <div class="meta">Turno: ${turno}<br/>Período: ${MES}<br/>Total: ${scores.length}</div>
    </div>
    ${faixaTipo==="ruim"&&scores.length?`<div class="print-alrt">Feedback individual obrigatório para todos os colaboradores desta lista.</div>`:""}

      _________________________ <br/><strong>${sup?.nome||"Supervisor"}</strong><br/>Supervisor de Turno
    </div>
    ${printFooter()}
  `);
}

function imprimirRanking(){

// ═══════════════════════════════════════════════════════════════════════════
// PERSISTÊNCIA — Google Sheets via Apps Script (Web App) + localStorage fallback
// ═══════════════════════════════════════════════════════════════════════════
//
// COMO FUNCIONA:
//  1. Usuário informa o ID da planilha na tela de login
//  2. O sistema chama um Apps Script publicado como Web App
//  3. O Apps Script lê/escreve abas na planilha usando JSON
//  4. localStorage salva o Sheet ID e os dados localmente como cache
//
// ABAS DA PLANILHA:
//   gestao | colaboradores | inconformidades | destaques | criterios_json
//
// O Apps Script precisa ser publicado como Web App com acesso "Qualquer pessoa"
// ─────────────────────────────────────────────────────────────────────────────

const LS_KEY = "pe_db_v1";
const LS_SHEET = "pe_sheet_id";
const GAS_URL = "https://script.google.com/macros/s/AKfycby2eOfmVr6RFBT8WyIsDg5ZwsJ4CGPcXHJQSfNzosR3CtL-1PTwfw7b_3I-WDfQWiff2w/exec"; // URL do Apps Script — fixo

// ── localStorage helpers ──────────────────────────────────────────────────
function lsSave(){ try{ localStorage.setItem("pe_db_v1",JSON.stringify(DB)); }catch(e){} }
function lsLoad(){
  try{
    const raw=localStorage.getItem("pe_db_v1");
    if(raw){ const d=JSON.parse(raw); if(d && d.gestao && d.colaboradores) return d; }
  }catch(e){}
  return null;
}
function lsSaveSheet(id){ try{ localStorage.setItem(LS_SHEET, id); }catch(e){} }
function lsLoadSheet(){ try{ return localStorage.getItem(LS_SHEET)||""; }catch(e){ return ""; } }

// ── Auto-save: salva no localStorage sempre que DB muda ───────────────────
const _dbProxy = new Proxy({save:lsSave},{});
function dbChanged(){ lsSave(); syncSheetIfConnected(); }

// Sheet ID não exposto ao usuário — gerenciado internamente pelo Apps Script
let SHEET_ID = "";

// ── Carregar dados do Apps Script ────────────────────────────────────────
async function loadFromGAS(){
  try{
    const res = await fetch(GAS_URL+"?action=load", {
      signal: AbortSignal.timeout(10000)
    });
    if(!res.ok) return null;
    const d = await res.json();
    if(!d || !d.gestao || d.gestao.length===0) return null;
    return {
      gestao: d.gestao.map(g=>{
        const o={...g};
        o.email=(o.email||"").toLowerCase();
        return o;
      }),
      colaboradores: d.colaboradores||[],
      inconformidades: d.inconformidades||[],
      destaques: d.destaques||[],
      criterios: d.criterios||DB.criterios,
      historico: d.historico||DB.historico,
    };
  }catch(e){
    console.warn("GAS load error:", e);
    return null;
  }
}

// mantém compatibilidade
async function loadFromSheet(id){ return loadFromGAS(); }

// ── Salvar dados no Google Sheets via GAS Web App ──────────────────────────
// Requer Apps Script publicado. Se não configurado, só salva localStorage.
async function syncSheetIfConnected(){ dbSave(); } // alias

async function pushToSheet(){ dbSave(); } // delega para dbSave

function showSyncStatus(msg, type){
  const el=document.getElementById("sync-status-bar");
  if(!el) return;
  el.textContent=msg;
  el.className=`alrt alrt-${type}`;
  el.style.display="block";
  setTimeout(()=>{ if(el) el.style.display="none"; }, 4000);
}

// ── Salvar manualmente (botão na tela ADM) ────────────────────────────────
async function syncManual(){
  showSyncStatus("⏳ Sincronizando...", "if");
  dbSave();
}

// ── doLogin: carrega Sheet antes de autenticar ─────────────────────────────
function doLogin(){
  const email = document.getElementById("l-email").value.trim().toLowerCase();
  const senha = document.getElementById("l-senha").value;
  const err   = document.getElementById("login-err");
  const info  = document.getElementById("login-sync-info");
  const btn   = document.getElementById("btn-entrar");

  err.style.display="none";
  btn.textContent="Aguarde...";
  btn.disabled=true;

  // Carrega dados do Apps Script silenciosamente
  loadFromGAS().then(gasData=>{
    if(gasData && gasData.gestao && gasData.gestao.length > 0){
      DB = gasData;
      lsSave();
    } else {
      // Fallback: localStorage
      const local = lsLoad();
      if(local) DB = local;
    }
    _finalizarLogin(email, senha, err, btn);
  }).catch(()=>{
    const local = lsLoad();
    if(local) DB = local;
    _finalizarLogin(email, senha, err, btn);
  });
}

function _finalizarLogin(email, senha, err, btn){
  btn.textContent="Entrar";
  btn.disabled=false;
  const u = findUser(email, senha);
  if(!u){
    err.textContent="E-mail ou senha incorretos.";
    err.style.display="block";
    return;
  }
  SESSION={...u};
  PAGE=PERFIS[u.perfil].pages[0];
  document.getElementById("login-screen").style.display="none";
  document.getElementById("main-layout").classList.add("visible");
  buildLayout();renderPage();
}

// Configuração de GAS gerenciada internamente

}

// ── Interceptar mudanças no DB para auto-salvar ───────────────────────────
// Sobrescreve funções que alteram DB para chamar lsSave() após
// ── dbSave — salva localStorage + envia ao GAS em background ──────────────
function dbSave(){
  // 1. Salva imediatamente no localStorage (não falha)
  try{ localStorage.setItem("pe_db_v1", JSON.stringify(DB)); }catch(e){}
  // 2. Envia ao Apps Script com debounce de 1.5s para não sobrecarregar
  clearTimeout(dbSave._t);
  dbSave._t = setTimeout(async ()=>{
    try{
      const res = await fetch(GAS_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          action:"save",
          gestao: DB.gestao,
          colaboradores: DB.colaboradores,
          inconformidades: DB.inconformidades,
          destaques: DB.destaques,
          criterios: DB.criterios,
          historico: DB.historico,
        }),
      });
      if(res.ok) showSyncStatus("✓ Dados salvos", "ok");
      else       showSyncStatus("⚠ Falha ao salvar remotamente", "wn");
    }catch(e){
      showSyncStatus("⚠ Sem conexão — salvo localmente", "wn");
    }
  }, 1500);
}
dbSave._t = null;

// ── INIT ──────────────────────────────────────────────────────────────────
// URL do Apps Script e Sheet ID fixos — transparente para o usuário
// GAS_URL já configurado acima como constante

document.getElementById("l-email").addEventListener("keydown",e=>e.key==="Enter"&&doLogin());
document.getElementById("l-senha").addEventListener("keydown",e=>e.key==="Enter"&&doLogin());
</script>
